<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h1{
            text-align: center;
            color: rgb(235, 8, 8);
        }
              
        
    </style>
</head>
<body>
    <h1><i><u>Expense Tracker</u></i></h1>
    <div class = "box">
        <input type = "text" id = "expenseName" placeholder="Enter Expense Name">
        <input type = "number" id = "expenseAmount" placeholder="Enter Expense Amount">
        <select id="category">
            <option value="" disabled selected>Select Expenses</option>
            <option value="food">Food</option>
            <option value="shopping">GF's Shopping</option>
            <option value="transportation">Transportation</option>
            <option value="entertainment">Entertainment</option>
            <option value="utilities">Utilities</option>
            <option value="other">Other</option>
        </select>
        <input type = "date" id = "expenseDate">
        <button id="addExpenseBtn">Add Expense</button>
     </div>  
    <hr style="width:100%; height:3px; background-color:black;"> 
    <div id="expenseList" class="box">
        <h2>Expense List</h2>
        <table id = "expenseTable">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Amount</th>
                    <th>Category</th>
                    <th>Date</th>
                    <th>Action</th>     
                </tr>
            </thead>
            <tbody id="expense-List"></tbody>
        </table>
           <div class="total-amount">
                <strong>Total:</strong> $<span id="total-amount">0</span>
            </div>
        </div>
        <div class ="result-box">
            <h2>Expense Summary</h2>
            <p>Total Expenses: $<span id="total-expenses">0</span></p>
            <p>Average Expense: $<span id="average-expense">0</span></p>
            <p>Highest Expense: $<span id="highest-expense">0</span></p>
            <p>Lowest Expense: $<span id="lowest-expense">0</span></p>
        </div>
         <div class="filter">
            <label for="filter-category">Filter by Category:</label>
            <select id="filter-category">
                <option value="All">All</option>
                <option value="Food">Food</option>
                <option value="Transport">Transport</option>
                <option value="Entertainment">Entertainment</option>
                <option value="Other">Other</option>
            </select>
        </div>
    <script src = "script.js"></script>
</body>
</html>
