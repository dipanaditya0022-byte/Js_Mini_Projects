<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
        border: 2px solid rgb(4, 240, 16);
        padding: 20px;
        margin: 20px auto;
        width: 50%;
        display: flex;        
        flex-direction: column;          
        align-items: flex-start;
        gap: 10px;
        background-color: rgb(212, 30, 112);
        border-radius: 40px;   
        }
        h1{
            text-align: center;
            color: rgb(8, 235, 106);
        }
        input{
            flex : 1;
            padding: 6px;
            font-size: 20px;
            border: 2px solid rgb(21, 20, 21);
            border-radius: 10px;
            text-align: center;   
            width : 500px;  
        }
        button{
            padding: 5px 50px;
            font-size: 20px;
            border: 2px solid rgb(7, 7, 7);
            border-radius: 5px;
            background-color: rgb(139, 11, 45);
            color: rgb(15, 14, 14);
            cursor: pointer;
            
        }
        body{
            background-color: rgb(76, 59, 127);
        }
        
    </style>
</head>
<body>
    <h1><i><u>To Do List</u></i></h1>
    <div class = "box">
    <div>
        <input type="text" id="taskInput" placeholder="Enter a task">
        <button id="addTaskBtn">Add Task</button>
    </div>
<hr style="width:100%; height:3px; background-color:black;">
    <div>
        <button id = "all"> All</button>
        <button id = "active"> Active</button>
        <button id = "completed"> Completed</button>
        <button id = "pending"> Pending</button>
    </div>
    <hr style="width:100%; height:3px; background-color:black;"> 
    </div>
    <div id="taskList" class="box">
    <button id = "clear"> Clear All</button> 
    <hr style="width:100%; height:3px; background-color:black;"> </div>
    <script src = "script.js"></script>  
</body>
</html>
